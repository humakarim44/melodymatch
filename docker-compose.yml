version: '3.8'

services:
  # 1. The PostgreSQL Database
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD} # Pulls safely from your .env file
      POSTGRES_DB: spotify_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d spotify_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. The Prefect ETL Pipeline
  etl:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DB_HOST: db # Tells Python to look for the 'db' container, not localhost
    command: python etl_pipeline.py

# 3. The Streamlit App
  frontend:
    build: .
    depends_on:
      etl: # <-- Change this from 'db' to 'etl'
        condition: service_completed_successfully # <-- Add this specific condition!
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DB_HOST: db 
    ports:
      - "8501:8501"
    command: streamlit run app.py --server.address=0.0.0.0

volumes:
  postgres_data: